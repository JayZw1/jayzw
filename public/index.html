<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>碎碎念收件箱</title>
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="碎碎念收件箱" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="login-panel" id="loginPanel">
        <div>
          <p class="eyebrow">Private chat</p>
          <h1>碎碎念收件箱</h1>
          <p class="muted">只有我们听得见的频率，是宇宙留出的双人位</p>
        </div>
        <form id="loginForm" class="login-form">
          <label>
            账号
            <input id="username" name="username" autocomplete="username" required />
          </label>
          <label>
            密码
            <input id="password" name="password" type="password" autocomplete="current-password" required />
          </label>
          <button type="submit">登录</button>
          <button class="ghost" id="openPasswordChangeButton" type="button">更改密码</button>
          <p class="error" id="loginError" role="alert"></p>
        </form>
      </section>

      <section class="chat-panel hidden" id="chatPanel">
        <header class="chat-header">
          <div>
            <div class="title-row">
              <div class="title-stack">
                <button class="ghost diary-button" id="diaryButton" type="button">我们的日记</button>
                <h1>碎碎念收件箱</h1>
              </div>
              <div class="header-tool-stack header-feature-stack">
                <button class="ghost other-feature-button" id="otherFeatureButton" type="button">其他功能</button>
                <button class="ghost important-days-button" id="importantDaysButton" type="button">重要日子</button>
              </div>
              <div class="header-tool-stack header-life-stack">
                <button class="ghost food-button" id="foodButton" type="button">买菜</button>
                <button class="ghost schedule-button" id="scheduleButton" type="button">行程</button>
              </div>
              <div class="header-tool-stack header-action-stack">
                <button class="ghost icon-control danger-control" id="clearHistoryButton" type="button" title="清空聊天记录">清</button>
                <button class="ghost icon-control" id="logoutButton" type="button">退出</button>
              </div>
              <div class="header-status-row">
                <p id="statusText">正在连接...</p>
                <button class="ghost message-search-button" id="messageSearchButton" type="button">聊天记录</button>
                <div class="header-weather-stack">
                <button class="today-badge" id="todayBadge" type="button" title="查看未来天气" hidden>
                  <strong id="todayWeatherText" hidden></strong>
                  <span id="todayDateText"></span>
                  <small id="todayFestivalText" hidden></small>
                </button>
                </div>
              </div>
            </div>
          </div>
        </header>

        <div class="messages" id="messages"></div>

        <form class="composer" id="messageForm">
          <div class="reply-preview hidden" id="replyPreview"></div>
          <input class="file-input" id="fileInput" type="file" />
          <button class="attach-button" id="attachButton" type="button" title="添加附件">+</button>
          <textarea id="messageInput" placeholder="输入消息..." maxlength="1000" rows="1"></textarea>
          <button class="call-button" id="callMenuButton" type="button" title="通话">📱</button>
          <button class="emoji-button" id="emojiButton" type="button" title="表情">☺</button>
          <div class="attachment-preview hidden" id="attachmentPreview"></div>
          <div class="call-menu hidden" id="callMenu">
            <button type="button" id="audioCallButton">☎ 语音通话</button>
            <button type="button" id="videoCallButton">📱 视频通话</button>
          </div>
          <div class="emoji-panel hidden" id="emojiPanel">
            <div class="emoji-tabs">
              <button class="active" type="button" data-emoji-tab="emoji">表情</button>
              <button type="button" data-emoji-tab="sticker">表情包</button>
            </div>
            <div class="emoji-grid" id="emojiGrid"></div>
            <div class="sticker-pane hidden" id="stickerPane">
              <div class="sticker-search" id="stickerSearchForm">
                <input id="stickerSearchInput" placeholder="搜索表情包" value="开心" />
                <button type="button" id="stickerSearchButton">搜索</button>
              </div>
              <div class="sticker-preview" id="stickerPreview">点击“换一张”获取表情包</div>
              <div class="sticker-actions">
                <button type="button" id="refreshStickerButton">换一张</button>
                <button type="button" id="sendStickerButton">发送表情包</button>
              </div>
            </div>
          </div>
          <button id="sendButton" type="submit">发送</button>
        </form>
      </section>

      <div class="context-menu hidden" id="contextMenu" role="menu">
        <button type="button" data-action="quote">引用</button>
        <button type="button" data-action="recall">撤回</button>
        <button type="button" data-action="delete">删除</button>
      </div>

      <div class="password-change-panel hidden" id="passwordChangePanel">
        <div class="password-change-card">
          <div class="modal-title">
            <h2>更改密码</h2>
            <button class="ghost icon-control" id="closePasswordChangeButton" type="button" title="关闭">×</button>
          </div>
          <form class="password-change-form" id="passwordChangeForm">
            <input id="passwordChangeUsername" autocomplete="username" placeholder="账号" required />
            <input id="passwordChangeOld" type="password" autocomplete="current-password" placeholder="旧密码" required />
            <input id="passwordChangeNew" type="password" autocomplete="new-password" placeholder="新密码" required />
            <input id="passwordChangeConfirm" type="password" autocomplete="new-password" placeholder="重复一遍新密码" required />
            <button type="submit">保存</button>
          </form>
          <p class="password-change-status" id="passwordChangeStatus"></p>
        </div>
      </div>

      <div class="call-panel hidden" id="callPanel">
        <div class="call-box">
          <p id="callStatus">正在通话</p>
          <div class="video-grid">
            <video id="remoteVideo" autoplay playsinline></video>
            <img class="hidden" id="remoteRelayImage" alt="对方画面" />
            <audio id="remoteRelayAudio" autoplay></audio>
            <video id="localVideo" autoplay muted playsinline></video>
          </div>
          <div class="call-controls">
            <button type="button" id="acceptCallButton">接听</button>
            <button type="button" id="declineCallButton">拒绝</button>
            <button type="button" id="endCallButton">结束</button>
          </div>
        </div>
      </div>

      <div class="important-days-panel hidden" id="importantDaysPanel">
        <div class="important-days-card">
          <div class="modal-title">
            <h2>重要日子</h2>
            <button class="ghost icon-control" id="closeImportantDaysButton" type="button" title="关闭">×</button>
          </div>
          <div class="important-days-list" id="importantDaysList">正在计算...</div>
        </div>
      </div>

      <div class="other-feature-panel hidden" id="otherFeaturePanel">
        <div class="other-feature-card">
          <div class="modal-title">
            <h2>其他功能</h2>
            <button class="ghost icon-control" id="closeOtherFeatureButton" type="button" title="关闭">×</button>
          </div>
          <div class="other-feature-list" id="otherFeatureList"></div>
        </div>
      </div>

      <div class="diary-panel hidden" id="diaryPanel">
        <div class="diary-card">
          <div class="modal-title">
            <h2>我们的日记</h2>
            <button class="ghost icon-control" id="closeDiaryButton" type="button" title="关闭">×</button>
          </div>
          <div class="diary-calendar">
            <div class="diary-calendar-head">
              <button class="ghost diary-month-button" id="prevDiaryMonthButton" type="button">‹</button>
              <strong id="diaryMonthTitle"></strong>
              <button class="ghost diary-month-button" id="nextDiaryMonthButton" type="button">›</button>
            </div>
            <div class="diary-weekdays">
              <span>一</span>
              <span>二</span>
              <span>三</span>
              <span>四</span>
              <span>五</span>
              <span>六</span>
              <span>日</span>
            </div>
            <div class="diary-calendar-grid" id="diaryCalendarGrid"></div>
          </div>
          <form class="diary-form" id="diaryForm">
            <input id="diaryInput" maxlength="120" placeholder="写下今天和对方有关的最开心的事" required />
            <button type="submit">保存</button>
          </form>
          <p class="diary-selected-date" id="diarySelectedDate"></p>
          <div class="diary-list" id="diaryList">正在加载...</div>
        </div>
      </div>

      <div class="message-search-panel hidden" id="messageSearchPanel">
        <div class="message-search-card">
          <div class="modal-title">
            <h2>聊天记录查询</h2>
            <button class="ghost icon-control" id="closeMessageSearchButton" type="button" title="关闭">×</button>
          </div>
          <form class="message-search-form" id="messageSearchForm">
            <input id="messageSearchInput" maxlength="80" placeholder="搜索聊天内容、附件名或发送人" />
            <button type="submit">搜索</button>
          </form>
          <div class="message-search-summary" id="messageSearchSummary">输入关键词查询聊天记录。</div>
          <div class="message-search-results" id="messageSearchResults"></div>
        </div>
      </div>

      <div class="weather-panel hidden" id="weatherPanel">
        <div class="weather-card">
          <div class="modal-title">
            <h2>顺德天气</h2>
            <button class="ghost icon-control" id="closeWeatherButton" type="button" title="关闭">×</button>
          </div>
          <div class="weather-list" id="weatherList">正在获取...</div>
        </div>
      </div>

      <div class="food-panel hidden" id="foodPanel">
        <div class="food-card">
          <div class="modal-title">
            <h2>买菜清单</h2>
            <button class="ghost icon-control" id="closeFoodButton" type="button" title="关闭">×</button>
          </div>
          <form class="food-form" id="foodForm">
            <input id="foodDateInput" type="date" required />
            <input id="foodNameInput" maxlength="80" placeholder="输入要买的菜" required />
            <button type="submit">添加</button>
          </form>
          <div class="food-list" id="foodList">正在加载...</div>
        </div>
      </div>

      <div class="schedule-panel hidden" id="schedulePanel">
        <div class="schedule-card">
          <div class="modal-title">
            <h2>行程</h2>
            <button class="ghost icon-control" id="closeScheduleButton" type="button" title="关闭">×</button>
          </div>
          <form class="schedule-form" id="scheduleForm">
            <input id="scheduleDateInput" type="date" required />
            <input id="scheduleContentInput" maxlength="120" placeholder="输入这天的行程" required />
            <button type="submit">添加</button>
          </form>
          <div class="schedule-list" id="scheduleList">正在加载...</div>
        </div>
      </div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
