<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>两个人的聊天</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="login-panel" id="loginPanel">
        <div>
          <p class="eyebrow">Private chat</p>
          <h1>两个人的聊天</h1>
          <p class="muted">只给你们两个人使用的简洁聊天页。</p>
        </div>
        <form id="loginForm" class="login-form">
          <label>
            账号
            <input id="username" name="username" autocomplete="username" required />
          </label>
          <label>
            密码
            <input id="password" name="password" type="password" autocomplete="current-password" required />
          </label>
          <button type="submit">登录</button>
          <p class="error" id="loginError" role="alert"></p>
        </form>
      </section>

      <section class="chat-panel hidden" id="chatPanel">
        <header class="chat-header">
          <div>
            <h1>两个人的聊天</h1>
            <p id="statusText">正在连接...</p>
          </div>
          <button class="ghost" id="logoutButton" type="button">退出</button>
        </header>

        <div class="messages" id="messages"></div>

        <form class="composer" id="messageForm">
          <div class="reply-preview hidden" id="replyPreview"></div>
          <input class="file-input" id="fileInput" type="file" />
          <button class="attach-button" id="attachButton" type="button" title="添加附件">+</button>
          <textarea id="messageInput" placeholder="输入消息..." maxlength="1000" rows="1"></textarea>
          <button class="emoji-button" id="emojiButton" type="button" title="表情">☺</button>
          <div class="attachment-preview hidden" id="attachmentPreview"></div>
          <div class="emoji-panel hidden" id="emojiPanel"></div>
          <button type="submit">发送</button>
        </form>
      </section>

      <div class="context-menu hidden" id="contextMenu" role="menu">
        <button type="button" data-action="quote">引用</button>
        <button type="button" data-action="recall">撤回</button>
        <button type="button" data-action="delete">删除</button>
      </div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
